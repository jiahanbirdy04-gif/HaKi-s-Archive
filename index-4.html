<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Haki's K-Drama Archive</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B0B0E">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="K-Drama Archive">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; background: #0B0B0E; font-family: -apple-system, 'Segoe UI', Roboto, Inter, sans-serif; }
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-thumb { background: #33333A; border-radius: 4px; }
button, input, select, textarea { font-family: -apple-system, 'Segoe UI', Roboto, Inter, sans-serif; }
a { text-decoration: none; }

.nav { position: sticky; top: 0; z-index: 20; display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; background: rgba(11,11,14,0.92); backdrop-filter: blur(10px);
  border-bottom: 1px solid #202024; flex-wrap: wrap; }
.nav-brand { display: flex; align-items: center; gap: 8px; cursor: pointer; margin-right: auto; }
.nav-brand-text { font-family: Georgia, 'Times New Roman', serif; color: #EDEAE3; font-weight: 700; font-size: 16px; letter-spacing: 1px; }
.nav-links { display: flex; gap: 2px; }
.nav-btn { background: none; border: none; cursor: pointer; color: #9A9AA3; font-size: 12px; font-weight: 600;
  letter-spacing: 0.5px; text-transform: uppercase; padding: 6px 8px; border-bottom: 2px solid transparent; }
.nav-btn.active { color: #F0DBA6; border-bottom: 2px solid #C9A461; }
.btn-gold { background: linear-gradient(135deg,#C9A461,#8F6D33); color: #14100A; border: none;
  border-radius: 8px; padding: 8px 14px; font-weight: 700; font-size: 13px; cursor: pointer; }

.page { max-width: 720px; margin: 0 auto; padding: 24px 16px 60px; }
.hero { text-align: center; padding: 36px 10px 28px; }
.hero-title { font-family: Georgia, 'Times New Roman', serif; font-weight: 700; font-size: 30px;
  color: #EDEAE3; letter-spacing: 1.2px; margin: 0 0 10px; text-shadow: 0 0 24px rgba(201,164,97,0.25); }
.hero-sub { color: #B7B4AC; font-size: 14px; font-style: italic; cursor: pointer; font-family: Georgia, 'Times New Roman', serif; }

.glass-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px; padding: 20px; margin-bottom: 20px; backdrop-filter: blur(6px); }
.profile-row { display: flex; gap: 14px; align-items: center; margin-bottom: 18px; }
.avatar { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg,#F0DBA6,#8F6D33);
  display: flex; align-items: center; justify-content: center; font-family: Georgia, 'Times New Roman', serif;
  font-weight: 700; font-size: 22px; color: #14100A; flex-shrink: 0; }
.profile-name { font-family: Georgia, 'Times New Roman', serif; color: #EDEAE3; font-size: 22px; margin: 0 0 4px; }
.profile-desc { color: #9A9AA3; font-size: 13px; margin: 0; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.stat-box { background: rgba(0,0,0,0.25); border-radius: 10px; padding: 10px 12px; }
.stat-value { font-family: 'Courier New', monospace; color: #F0DBA6; font-size: 18px; font-weight: 700; }
.stat-label { color: #8E8B85; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

.section-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; }
.section-title { font-family: Georgia, 'Times New Roman', serif; color: #EDEAE3; font-size: 20px; font-weight: 700; margin: 0 0 10px; }
.link-btn { background: none; border: none; color: #C9A461; font-size: 13px; cursor: pointer; font-weight: 600; }

.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.card { position: relative; background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px; overflow: hidden; cursor: pointer; }
.card-perf { height: 4px; background: repeating-linear-gradient(90deg,#33333A 0 4px,transparent 4px 8px); }
.card-body { padding: 10px; }
.poster-box { position: relative; background: #151519; border-radius: 10px; height: 130px;
  display: flex; align-items: center; justify-content: center; margin-bottom: 8px; overflow: hidden; font-size: 26px; }
.poster-img { width: 100%; height: 100%; object-fit: cover; }
.card-title { color: #EDEAE3; font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.card-meta { color: #8E8B85; font-size: 11px; }
.badge-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.cast-mini-row { display: flex; align-items: center; gap: 4px; margin-top: 6px; }
.cast-mini { width: 22px; height: 22px; border-radius: 50%; overflow: hidden; background: #1D1D22;
  display: flex; align-items: center; justify-content: center; font-size: 10px; color: #D8D5CC;
  border: 1px solid #2A2A30; flex-shrink: 0; }
.cast-mini img { width: 100%; height: 100%; object-fit: cover; }
.cast-mini-more { color: #8E8B85; font-size: 10px; margin-left: 2px; }
.badge-chip { font-size: 13px; }
.badge-chip-lg { font-size: 11px; background: rgba(201,164,97,0.1); border: 1px solid #33333A;
  border-radius: 20px; padding: 4px 9px; color: #D8D5CC; white-space: nowrap; display: inline-block; margin: 2px; }
.card-actions { display: flex; gap: 4px; padding: 0 10px 8px; }
.icon-toggle { background: none; border: none; cursor: pointer; font-size: 15px; padding: 4px; opacity: 0.4; filter: grayscale(1); }
.icon-toggle.active { opacity: 1; filter: none; }

.empty-state { text-align: center; padding: 40px 20px; border: 1px dashed #2A2A30; border-radius: 14px; }

.search-row { display: flex; gap: 8px; margin-bottom: 18px; }
.search-box { flex: 1; display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.04);
  border: 1px solid #2A2A30; border-radius: 10px; padding: 9px 12px; }
.search-input { background: none; border: none; outline: none; color: #EDEAE3; font-size: 13px; flex: 1; }
.select-box { background: #151519; color: #D8D5CC; border: 1px solid #2A2A30; border-radius: 10px; font-size: 12px; padding: 8px; }
.page-title { font-family: Georgia, 'Times New Roman', serif; color: #EDEAE3; font-size: 26px; margin-bottom: 18px; }
.back-btn { background: none; border: none; color: #C9A461; font-size: 13px; cursor: pointer; margin-bottom: 14px; font-weight: 600; }

.detail-banner { position: relative; border-radius: 16px; overflow: hidden; background: #151519;
  min-height: 220px; margin-bottom: 16px; display: flex; align-items: flex-end; }
.detail-banner-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
.detail-banner-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(11,11,14,0.95), rgba(11,11,14,0.2)); }
.detail-banner-text { position: relative; padding: 20px; }
.detail-title { font-family: Georgia, 'Times New Roman', serif; color: #EDEAE3; font-size: 26px; margin: 0 0 2px; }
.detail-native { color: #B7B4AC; font-size: 13px; margin: 0 0 6px; }
.detail-meta { color: #8E8B85; font-size: 12px; margin: 0 0 8px; font-family: 'Courier New', monospace; }
.detail-actions { display: flex; align-items: center; gap: 4px; margin-bottom: 18px; }
.icon-only-btn { background: rgba(255,255,255,0.05); border: 1px solid #2A2A30; border-radius: 8px; padding: 8px;
  color: #D8D5CC; cursor: pointer; font-size: 14px; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.cast-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.cast-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
  overflow: hidden; cursor: pointer; text-align: center; padding-bottom: 8px; }
.cast-pic { background: #151519; height: 90px; display: flex; align-items: center; justify-content: center; font-size: 22px; overflow: hidden; }
.cast-pic img { width: 100%; height: 100%; object-fit: cover; }
.cast-name { color: #EDEAE3; font-size: 11.5px; font-weight: 600; margin-top: 6px; padding: 0 4px; }
.cast-sub { color: #8E8B85; font-size: 10px; padding: 0 4px; }
.comment-input-row { display: flex; gap: 8px; }
.comment-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #202024; font-size: 13px; }

.rating-stars { display: flex; align-items: center; gap: 4px; margin-top: 4px; }
.rating-stars .stars { font-size: 13px; letter-spacing: 1px; text-shadow: 0 0 6px rgba(201,164,97,0.5); }
.rating-stars .rating-label { font-family: 'Courier New', monospace; font-size: 10px; color: #8E8B85; }
.rating-stars.lg .stars { font-size: 18px; }
.rating-stars.lg .rating-label { font-size: 12px; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 50; display: flex;
  align-items: flex-end; justify-content: center; }
.modal { background: #141418; border-top: 1px solid #2A2A30; border-radius: 16px 16px 0 0;
  width: 100%; max-width: 720px; max-height: 88vh; overflow-y: auto; padding: 20px; }
.modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.modal-title { font-family: Georgia, 'Times New Roman', serif; color: #EDEAE3; font-size: 22px; margin: 0; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field-wrap { display: flex; flex-direction: column; gap: 4px; }
.field-wrap.full { grid-column: 1 / -1; }
.field-label { color: #8E8B85; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
.field-hint { text-transform: none; color: #5E5B55; font-size: 10.5px; letter-spacing: 0; }
.field-input { background: rgba(255,255,255,0.04); border: 1px solid #2A2A30; border-radius: 8px;
  padding: 8px 10px; color: #EDEAE3; font-size: 13px; outline: none; width: 100%; }
textarea.field-input { resize: vertical; }
.badge-picker { margin-top: 14px; }
.badge-btn { font-size: 11px; background: rgba(201,164,97,0.1); border-radius: 20px; padding: 4px 9px;
  color: #D8D5CC; white-space: nowrap; margin: 2px; cursor: pointer; border: 1px solid #33333A; opacity: 0.55; }
.badge-btn.selected { border: 1px solid #C9A461; opacity: 1; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.cancel-btn { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid #2A2A30; border-radius: 10px;
  padding: 12px; color: #D8D5CC; cursor: pointer; font-weight: 600; }
.save-btn { flex: 2; background: linear-gradient(135deg,#C9A461,#8F6D33); border: none; border-radius: 10px;
  padding: 12px; color: #14100A; cursor: pointer; font-weight: 700; }
.crop-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: flex;
  flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
.crop-frame { position: relative; overflow: hidden; background: #111; border: 2px solid #C9A461;
  border-radius: 12px; touch-action: none; }
.crop-frame img { position: absolute; top: 0; left: 0; user-select: none; -webkit-user-drag: none; pointer-events: none; }
.crop-controls { margin-top: 16px; width: 100%; max-width: 320px; }
.crop-zoom-row { display: flex; align-items: center; gap: 10px; color: #D8D5CC; font-size: 14px; }
.crop-hint { color: #8E8B85; font-size: 11px; text-align: center; margin-top: 6px; }
.crop-buttons { display: flex; gap: 10px; margin-top: 16px; width: 100%; max-width: 320px; }
</style>
</head>
<body>
<div id="root"></div>
<script>
(function () {
  "use strict";

  var RATING_SCALE = ["10/10","100/10","1000/10","1M/10","10M/10","100M/10","1B/10","10B/10","100B/10","∞/10"];
  var BADGES = {
    masterpiece: { label: "Masterpiece", emoji: "🏆" },
    ktrauma: { label: "K-Trauma", emoji: "💔" },
    comedy: { label: "Comedy Gold", emoji: "😂" },
    cried: { label: "Made Me Cry", emoji: "😭" },
    action: { label: "Peak Action", emoji: "🔥" },
    comfort: { label: "Comfort Watch", emoji: "❤️" },
    halloffame: { label: "Hall of Fame", emoji: "👑" },
    ost: { label: "Favorite OST", emoji: "⭐" },
    rewatch: { label: "Rewatch Worthy", emoji: "✨" }
  };
  var STATUSES = ["Want to Watch", "Watching", "Completed", "Dropped", "Paused"];
  var TYPES = ["K-Drama", "C-Drama", "BL", "J-Drama", "Movies"];
  var QUOTES = [
    "Every story I watched became a memory worth keeping.",
    "Some endings stay with you longer than the drama itself.",
    "A good OST can wreck you more than the finale.",
    "I didn't cry, my eyes just leaked emotional damage.",
    "Every rewatch is just visiting an old friend."
  ];
  var TITLES_KEY = "kdrama-archive:titles";
  var CHARACTERS_KEY = "kdrama-archive:characters";

  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
  function esc(s) {
    if (s === null || s === undefined) return "";
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function calcAge(birthday) {
    if (!birthday) return "";
    var b = new Date(birthday);
    if (isNaN(b)) return "";
    var now = new Date();
    var age = now.getFullYear() - b.getFullYear();
    var m = now.getMonth() - b.getMonth();
    if (m < 0 || (m === 0 && now.getDate() < b.getDate())) age--;
    return age;
  }
  function loadJSON(key, fallback) {
    try {
      var v = localStorage.getItem(key);
      return v ? JSON.parse(v) : fallback;
    } catch (e) { return fallback; }
  }
  function saveJSON(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
  }
  var TITLE_FORM_FIELD_IDS = ["f-title","f-nativeTitle","f-country","f-year","f-type","f-status","f-genre",
    "f-episodes","f-runtime","f-finishedDate","f-rating","f-poster","f-overview","f-review",
    "f-favoriteScene","f-favoriteQuote","f-tags"];
  function captureFormDraft() {
    if (!state.showForm) return null;
    var vals = {};
    TITLE_FORM_FIELD_IDS.forEach(function (id) { var el = document.getElementById(id); if (el) vals[id] = el.value; });
    return vals;
  }
  function restoreFormDraft(vals) {
    if (!vals) return;
    Object.keys(vals).forEach(function (id) { var el = document.getElementById(id); if (el) el.value = vals[id]; });
  }
  function renderPreserveForm() {
    var vals = captureFormDraft();
    render();
    restoreFormDraft(vals);
  }

  var state = {
    page: "home",
    titles: loadJSON(TITLES_KEY, []),
    characters: loadJSON(CHARACTERS_KEY, []),
    query: "",
    typeFilter: "All",
    selectedId: null,
    selectedCharId: null,
    quote: QUOTES[0],
    showForm: false,
    showCharForm: false,
    editingTitleId: null,
    editingCharId: null,
    formBadges: [],
    formCast: [],
    showCastForm: false,
    castDraftMode: false,
    castFormTitleId: null,
    editingCastId: null,
    editingCastDraftId: null,
    selectedCastTitleId: null,
    selectedCastId: null
  };

  function persistTitles() { saveJSON(TITLES_KEY, state.titles); }
  function persistCharacters() { saveJSON(CHARACTERS_KEY, state.characters); }

  function getTitle(id) { return state.titles.filter(function (t) { return t.id === id; })[0]; }
  function getChar(id) { return state.characters.filter(function (c) { return c.id === id; })[0]; }
  function getCast(titleId, castId) {
    var t = getTitle(titleId);
    if (!t || !t.cast) return null;
    return t.cast.filter(function (c) { return c.id === castId; })[0];
  }

  // ---------- Rendering ----------

  function render() {
    var root = document.getElementById("root");
    var html = navHTML();
    if (state.page === "home") html += homeHTML();
    else if (state.page === "archive") html += archiveHTML();
    else if (state.page === "detail") html += detailHTML();
    else if (state.page === "characters") html += charactersHTML();
    else if (state.page === "charDetail") html += charDetailHTML();
    else if (state.page === "castDetail") html += castDetailHTML();

    if (state.showForm) html += formModalHTML();
    if (state.showCharForm) html += charFormModalHTML();
    if (state.showCastForm) html += castFormModalHTML();

    root.innerHTML = html;
    wireEvents();
  }

  function navHTML() {
    function nb(key, label) {
      var active = state.page === key || (key === "archive" && (state.page === "detail" || state.page === "castDetail")) || (key === "characters" && state.page === "charDetail");
      return '<button class="nav-btn ' + (active ? "active" : "") + '" data-nav="' + key + '">' + label + "</button>";
    }
    var addLabel = state.page === "characters" || state.page === "charDetail" ? "+ Add" : "+ Add";
    var addAction = state.page === "characters" || state.page === "charDetail" ? "new-char" : "new-title";
    return '<div class="nav">' +
      '<div class="nav-brand" data-nav="home"><span style="color:#C9A461">🎬</span><span class="nav-brand-text">HAKI\'S ARCHIVE</span></div>' +
      '<div class="nav-links">' + nb("home", "Home") + nb("archive", "Archive") + nb("characters", "Fav. Actor/Crush") + "</div>" +
      '<button class="btn-gold" data-action="' + addAction + '">' + addLabel + "</button>" +
      "</div>";
  }

  function computeStats() {
    var movies = state.titles.filter(function (t) { return t.type === "Movies"; }).length;
    var series = state.titles.length - movies;
    var genreCounts = {};
    state.titles.forEach(function (t) {
      (t.genre || "").split(",").map(function (g) { return g.trim(); }).filter(Boolean).forEach(function (g) {
        genreCounts[g] = (genreCounts[g] || 0) + 1;
      });
    });
    var favGenre = "—";
    var best = 0;
    Object.keys(genreCounts).forEach(function (g) { if (genreCounts[g] > best) { best = genreCounts[g]; favGenre = g; } });
    var newest = state.titles.slice().sort(function (a, b) { return (b.finishedDate || "").localeCompare(a.finishedDate || ""); })[0];
    return { series: series, movies: movies, favGenre: favGenre, newest: newest };
  }

  function homeHTML() {
    var stats = computeStats();
    var recent = state.titles.slice(0, 6);
    var html = '<div class="page">';
    html += '<div class="hero"><h1 class="hero-title">HAKI\'S K-DRAMA ARCHIVE</h1>' +
      '<p class="hero-sub" data-action="shuffle-quote">💭 "' + esc(state.quote) + '"</p></div>';
    html += '<div class="glass-card"><div class="profile-row"><div class="avatar">H</div><div>' +
      '<h2 class="profile-name">Haki</h2><p class="profile-desc">A fan of stories that make me laugh, cry, and leave emotional scars.</p></div></div>' +
      '<div class="stat-grid">' +
      statBox(stats.series, "Series Watched") + statBox(stats.movies, "Movies Watched") +
      statBox(stats.favGenre, "Favorite Genre") + statBox(stats.newest ? stats.newest.title : "—", "Newest Entry") +
      "</div></div>";
    html += '<div class="section-head"><h3 class="section-title">Continue The Archive</h3>' +
      '<button class="link-btn" data-nav="archive">View all →</button></div>';
    if (recent.length === 0) {
      html += emptyState("Nothing added yet. Tap Add to log your first watch.");
    } else {
      html += '<div class="grid">' + recent.map(function (t) { return titleCardHTML(t, false); }).join("") + "</div>";
    }
    html += "</div>";
    return html;
  }

  function statBox(value, label) {
    return '<div class="stat-box"><div class="stat-value">' + esc(value) + '</div><div class="stat-label">' + esc(label) + "</div></div>";
  }

  function emptyState(text) {
    return '<div class="empty-state"><div style="font-size:22px;margin-bottom:10px">✨</div><p style="color:#9A9AA3;font-size:14px">' + esc(text) + "</p></div>";
  }

  function starRating(rating, lg) {
    var idx = RATING_SCALE.indexOf(rating);
    if (idx === -1) idx = 0;
    var filled = Math.max(1, Math.round(((idx + 1) / RATING_SCALE.length) * 5));
    var stars = "";
    for (var i = 0; i < 5; i++) stars += (i < filled ? "⭐" : "☆");
    return '<div class="rating-stars' + (lg ? " lg" : "") + '"><span class="stars">' + stars + '</span><span class="rating-label">' + esc(rating) + "</span></div>";
  }

  function titleCardHTML(t, showActions) {
    var poster = t.poster ? '<img class="poster-img" src="' + esc(t.poster) + '" alt="">' : "🎬";
    var badges = (t.badges || []).slice(0, 3).map(function (b) {
      return '<span class="badge-chip" title="' + esc(BADGES[b] ? BADGES[b].label : "") + '">' + (BADGES[b] ? BADGES[b].emoji : "") + "</span>";
    }).join("");
    var actions = showActions ? '<div class="card-actions">' +
      '<button class="icon-toggle ' + (t.liked ? "active" : "") + '" data-toggle="liked" data-id="' + t.id + '">❤</button>' +
      '<button class="icon-toggle ' + (t.bookmarked ? "active" : "") + '" data-toggle="bookmarked" data-id="' + t.id + '">🔖</button>' +
      "</div>" : "";
    var castPreview = "";
    if (t.cast && t.cast.length) {
      var shown = t.cast.slice(0, 4).map(function (c) {
        var initial = (c.actorRealName || c.roleName || "?").charAt(0).toUpperCase();
        var pic = c.picture ? '<img src="' + esc(c.picture) + '" alt="">' : esc(initial);
        return '<div class="cast-mini" title="' + esc(c.roleName || c.actorRealName) + '">' + pic + "</div>";
      }).join("");
      var more = t.cast.length > 4 ? '<span class="cast-mini-more">+' + (t.cast.length - 4) + "</span>" : "";
      castPreview = '<div class="cast-mini-row">' + shown + more + "</div>";
    }
    return '<div class="card"><div class="card-perf"></div>' +
      '<div class="card-body" data-open-title="' + t.id + '">' +
      '<div class="poster-box">' + poster + "</div>" +
      '<div class="card-title">' + esc(t.title) + '</div>' +

  // ---------- Event wiring ----------

  function wireEvents() {
    var root = document.getElementById("root");

    root.querySelectorAll("[data-nav]").forEach(function (el) {
      el.addEventListener("click", function () { state.page = el.getAttribute("data-nav"); render(); });
    });

    var shuffleEl = root.querySelector("[data-action='shuffle-quote']");
    if (shuffleEl) shuffleEl.addEventListener("click", function () {
      state.quote = QUOTES[Math.floor(Math.random() * QUOTES.length)];
      render();
    });

    root.querySelectorAll("[data-open-title]").forEach(function (el) {
      el.addEventListener("click", function () {
        state.selectedId = el.getAttribute("data-open-title");
        state.page = "detail";
        render();
      });
    });
    root.querySelectorAll("[data-open-char]").forEach(function (el) {
      el.addEventListener("click", function () {
        state.selectedCharId = el.getAttribute("data-open-char");
        state.page = "charDetail";
        render();
      });
    });
    root.querySelectorAll("[data-open-cast]").forEach(function (el) {
      el.addEventListener("click", function (e) {
        e.stopPropagation();
        state.selectedCastTitleId = el.getAttribute("data-cast-title-id");
        state.selectedCastId = el.getAttribute("data-open-cast");
        state.page = "castDetail";
        render();
      });
    });
    root.querySelectorAll("[data-nav-title]").forEach(function (el) {
      el.addEventListener("click", function () {
        state.selectedId = el.getAttribute("data-nav-title");
        state.page = "detail";
        render();
      });
    });

    root.querySelectorAll("[data-toggle]").forEach(function (el) {
      el.addEventListener("click", function (e) {
        e.stopPropagation();
        var id = el.getAttribute("data-id");
        var field = el.getAttribute("data-toggle");
        var t = getTitle(id);
        if (t) { t[field] = !t[field]; persistTitles(); render(); }
      });
    });

    var newTitleBtn = root.querySelector("[data-action='new-title']");
    if (newTitleBtn) newTitleBtn.addEventListener("click", function () {
      state.editingTitleId = null;
      state.formBadges = [];
      state.formCast = [];
      state.showForm = true;
      render();
    });
    var newCharBtn = root.querySelector("[data-action='new-char']");
    if (newCharBtn) newCharBtn.addEventListener("click", function () {
      state.editingCharId = null;
      state.showCharForm = true;
      render();
    });

    root.querySelectorAll("[data-action='edit-title']").forEach(function (el) {
      el.addEventListener("click", function () {
        var t = getTitle(el.getAttribute("data-id"));
        state.editingTitleId = t.id;
        state.formBadges = (t.badges || []).slice();
        state.formCast = (t.cast || []).map(function (c) { return Object.assign({}, c); });
        state.showForm = true;
        render();
      });
    });
    root.querySelectorAll("[data-action='delete-title']").forEach(function (el) {
      el.addEventListener("click", function () {
        var id = el.getAttribute("data-id");
        var t = getTitle(id);
        if (!confirm('Delete "' + (t ? t.title : "this title") + '"? This cannot be undone.')) return;
        state.titles = state.titles.filter(function (x) { return x.id !== id; });
        persistTitles();
        state.page = "archive";
        render();
      });
    });
    root.querySelectorAll("[data-action='edit-char']").forEach(function (el) {
      el.addEventListener("click", function () {
        state.editingCharId = el.getAttribute("data-id");
        state.showCharForm = true;
        render();
      });
    });
    root.querySelectorAll("[data-action='delete-char']").forEach(function (el) {
      el.addEventListener("click", function () {
        var id = el.getAttribute("data-id");
        var c = getChar(id);
        if (!confirm('Remove "' + (c ? c.characterName : "this favorite") + '"? This cannot be undone.')) return;
        state.characters = state.characters.filter(function (x) { return x.id !== id; });
        persistCharacters();
        state.page = "characters";
        render();
      });
    });

    var newCastBtn = root.querySelector("[data-action='new-cast']");
    if (newCastBtn) newCastBtn.addEventListener("click", function () {
      state.castFormTitleId = newCastBtn.getAttribute("data-title-id");
      state.editingCastId = null;
      state.castDraftMode = false;
      state.showCastForm = true;
      render();
    });
    var newCastDraftBtn = root.querySelector("[data-action='new-cast-draft']");
    if (newCastDraftBtn) newCastDraftBtn.addEventListener("click", function () {
      state.editingCastId = null;
      state.editingCastDraftId = null;
      state.castDraftMode = true;
      state.showCastForm = true;
      renderPreserveForm();
    });
    root.querySelectorAll("[data-edit-cast-draft]").forEach(function (el) {
      el.addEventListener("click", function () {
        state.editingCastDraftId = el.getAttribute("data-edit-cast-draft");
        state.castDraftMode = true;
        state.showCastForm = true;
        renderPreserveForm();
      });
    });
    root.querySelectorAll("[data-action='remove-cast-draft']").forEach(function (el) {
      el.addEventListener("click", function (e) {
        e.stopPropagation();
        var id = el.getAttribute("data-cast-draft-id");
        state.formCast = state.formCast.filter(function (c) { return c.id !== id; });
        renderPreserveForm();
      });
    });
    root.querySelectorAll("[data-action='edit-cast']").forEach(function (el) {
      el.addEventListener("click", function () {
        state.castFormTitleId = el.getAttribute("data-title-id");
        state.editingCastId = el.getAttribute("data-id");
        state.castDraftMode = false;
        state.showCastForm = true;
        render();
      });
    });
    root.querySelectorAll("[data-action='delete-cast']").forEach(function (el) {
      el.addEventListener("click", function () {
        var titleId = el.getAttribute("data-title-id");
        var castId = el.getAttribute("data-id");
        var t = getTitle(titleId);
        var c = t ? getCast(titleId, castId) : null;
        if (!confirm('Remove "' + (c ? (c.roleName || c.actorRealName) : "this character") + '"? This cannot be undone.')) return;
        if (t && t.cast) t.cast = t.cast.filter(function (x) { return x.id !== castId; });
        persistTitles();
        state.selectedId = titleId;
        state.page = "detail";
        render();
      });
    });

    root.querySelectorAll("[data-action='close-form']").forEach(function (el) {
      el.addEventListener("click", function () { state.showForm = false; render(); });
    });
    root.querySelectorAll("[data-action='close-char-form']").forEach(function (el) {
      el.addEventListener("click", function () { state.showCharForm = false; render(); });
    });
    root.querySelectorAll("[data-action='close-cast-form']").forEach(function (el) {
      el.addEventListener("click", function () { state.showCastForm = false; renderPreserveForm(); });
    });

    root.querySelectorAll("[data-badge-toggle]").forEach(function (el) {
      el.addEventListener("click", function () {
        var key = el.getAttribute("data-badge-toggle");
        var idx = state.formBadges.indexOf(key);
        if (idx === -1) state.formBadges.push(key); else state.formBadges.splice(idx, 1);
        el.classList.toggle("selected");
      });
    });

    var saveTitleBtn = root.querySelector("[data-action='save-title']");
    if (saveTitleBtn) saveTitleBtn.addEventListener("click", function () {
      var val = function (id) { var e = document.getElementById(id); return e ? e.value : ""; };
      var titleVal = val("f-title").trim();
      if (!titleVal) { alert("Title is required."); return; }
      var data = {
        title: titleVal,
        nativeTitle: val("f-nativeTitle"),
        country: val("f-country"),
        year: val("f-year"),
        type: val("f-type"),
        status: val("f-status"),
        genre: val("f-genre"),
        episodes: val("f-episodes"),
        runtime: val("f-runtime"),
        finishedDate: val("f-finishedDate"),
        rating: val("f-rating"),
        poster: val("f-poster"),
        overview: val("f-overview"),
        review: val("f-review"),
        favoriteScene: val("f-favoriteScene"),
        favoriteQuote: val("f-favoriteQuote"),
        tags: val("f-tags"),
        badges: state.formBadges.slice(),
        cast: state.formCast.slice()
      };
      if (state.editingTitleId) {
        var existing = getTitle(state.editingTitleId);
        Object.keys(data).forEach(function (k) { existing[k] = data[k]; });
      } else {
        data.id = uid();
        data.liked = false; data.favorited = false; data.bookmarked = false; data.comments = [];
        state.titles.unshift(data);
      }
      persistTitles();
      state.showForm = false;
      render();
    });

    var saveCharBtn = root.querySelector("[data-action='save-char']");
    if (saveCharBtn) saveCharBtn.addEventListener("click", function () {
      var val = function (id) { var e = document.getElementById(id); return e ? e.value : ""; };
      var nameVal = val("c-characterName").trim();
      if (!nameVal) { alert("Real name / stage name is required."); return; }
      var data = {
        characterName: nameVal,
        drama: val("c-drama"),
        birthday: val("c-birthday"),
        instagram: val("c-instagram"),
        picture: val("c-picture"),
        background: val("c-background"),
        reason: val("c-reason")
      };
      if (state.editingCharId) {
        var existing = getChar(state.editingCharId);
        Object.keys(data).forEach(function (k) { existing[k] = data[k]; });
      } else {
        data.id = uid();
        state.characters.unshift(data);
      }
      persistCharacters();
      state.showCharForm = false;
      render();
    });

    var saveCastBtn = root.querySelector("[data-action='save-cast']");
    if (saveCastBtn) saveCastBtn.addEventListener("click", function () {
      var val = function (id) { var e = document.getElementById(id); return e ? e.value : ""; };
      var nameVal = val("cast-actorRealName").trim();
      if (!nameVal) { alert("Real name / stage name is required."); return; }
      var data = {
        roleName: val("cast-roleName"),
        actorRealName: nameVal,
        birthday: val("cast-birthday"),
        instagram: val("cast-instagram"),
        picture: val("cast-picture"),
        background: val("cast-background")
      };
      if (state.castDraftMode) {
        if (state.editingCastDraftId) {
          var existingDraft = getDraftCast(state.editingCastDraftId);
          if (existingDraft) Object.keys(data).forEach(function (k) { existingDraft[k] = data[k]; });
        } else {
          data.id = uid();
          state.formCast.unshift(data);
        }
        state.showCastForm = false;
        renderPreserveForm();
        return;
      }
      var t = getTitle(state.castFormTitleId);
      if (!t) return;
      if (!t.cast) t.cast = [];
      if (state.editingCastId) {
        var existing = getCast(t.id, state.editingCastId);
        Object.keys(data).forEach(function (k) { existing[k] = data[k]; });
      } else {
        data.id = uid();
        t.cast.unshift(data);
      }
      persistTitles();
      state.showCastForm = false;
      state.selectedId = t.id;
      state.page = "detail";
      render();
    });

    var addCommentBtn = root.querySelector("[data-action='add-comment']");
    if (addCommentBtn) addCommentBtn.addEventListener("click", function () {
      var input = document.getElementById("commentDraftInput");
      var text = input.value.trim();
      if (!text) return;
      var t = getTitle(addCommentBtn.getAttribute("data-id"));
      if (!t.comments) t.comments = [];
      t.comments.push({ id: uid(), text: text, date: new Date().toLocaleDateString() });
      persistTitles();
      render();
    });
    var commentInput = document.getElementById("commentDraftInput");
    if (commentInput) commentInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && addCommentBtn) addCommentBtn.click();
    });

    var searchInput = document.getElementById("searchInput");
    if (searchInput) searchInput.addEventListener("input", function (e) {
      var pos = e.target.selectionStart;
      state.query = e.target.value;
      render();
      var el = document.getElementById("searchInput");
      if (el) { el.focus(); try { el.setSelectionRange(pos, pos); } catch (err) {} }
    });
    var typeFilterSelect = document.getElementById("typeFilterSelect");
    if (typeFilterSelect) typeFilterSelect.addEventListener("change", function (e) {
      state.typeFilter = e.target.value;
      render();
    });

    root.querySelectorAll(".photo-upload-input").forEach(function (el) {
      el.addEventListener("change", function (e) {
        var file = e.target.files && e.target.files[0];
        if (!file) return;
        var targetId = el.getAttribute("data-target");
        var aspect = el.getAttribute("data-aspect") || "square";
        var reader = new FileReader();
        reader.onload = function (ev) {
          openCropModal(ev.target.result, targetId, aspect);
        };
        reader.onerror = function () { alert("Could not read that photo. Try a different one."); };
        reader.readAsDataURL(file);
      });
    });
  }

  function openCropModal(imgSrc, targetFieldId, aspect) {
    var frameW = aspect === "portrait" ? 240 : 260;
    var frameH = aspect === "portrait" ? 320 : 260;

    var overlay = document.createElement("div");
    overlay.className = "crop-overlay";
    overlay.innerHTML =
      '<div class="crop-frame" id="cropFrame" style="width:' + frameW + 'px;height:' + frameH + 'px">' +
        '<img id="cropImg" src="' + imgSrc + '" alt="">' +
      '</div>' +
      '<div class="crop-controls">' +
        '<div class="crop-zoom-row"><span>🔍−</span><input type="range" id="cropZoom" min="0" max="100" value="0" style="flex:1"><span>🔍+</span></div>' +
        '<p class="crop-hint">Drag the photo to reposition. Use the slider to zoom.</p>' +
      '</div>' +
      '<div class="crop-buttons">' +
        '<button class="cancel-btn" id="cropCancelBtn" type="button">Cancel</button>' +
        '<button class="save-btn" id="cropUseBtn" type="button">Use Photo</button>' +
      '</div>';
    document.body.appendChild(overlay);

    var imgEl = document.getElementById("cropImg");
    var frame = document.getElementById("cropFrame");
    var zoomSlider = document.getElementById("cropZoom");
    var naturalW, naturalH, baseScale, curScale, offsetX, offsetY, dragging = false, startX, startY, startOffX, startOffY;

    function clamp() {
      var dW = naturalW * curScale, dH = naturalH * curScale;
      var minX = frameW - dW, minY = frameH - dH;
      offsetX = Math.min(0, Math.max(minX, offsetX));
      offsetY = Math.min(0, Math.max(minY, offsetY));
    }
    function apply() {
      imgEl.style.width = (naturalW * curScale) + "px";
      imgEl.style.height = (naturalH * curScale) + "px";
      imgEl.style.transform = "translate(" + offsetX + "px," + offsetY + "px)";
    }

    var sourceImg = new Image();
    sourceImg.onload = function () {
      naturalW = sourceImg.naturalWidth;
      naturalH = sourceImg.naturalHeight;
      baseScale = Math.max(frameW / naturalW, frameH / naturalH);
      curScale = baseScale;
      offsetX = (frameW - naturalW * curScale) / 2;
      offsetY = (frameH - naturalH * curScale) / 2;
      clamp();
      apply();
    };
    sourceImg.src = imgSrc;

    zoomSlider.addEventListener("input", function () {
      var t = zoomSlider.value / 100;
      curScale = baseScale * (1 + t * 2);
      clamp();
      apply();
    });

    function pointerDown(e) {
      dragging = true;
      var p = e.touches ? e.touches[0] : e;
      startX = p.clientX; startY = p.clientY;
      startOffX = offsetX; startOffY = offsetY;
    }
    function pointerMove(e) {
      if (!dragging) return;
      var p = e.touches ? e.touches[0] : e;
      offsetX = startOffX + (p.clientX - startX);
      offsetY = startOffY + (p.clientY - startY);
      clamp();
      apply();
      if (e.cancelable) e.preventDefault();
    }
    function pointerUp() { dragging = false; }

    frame.addEventListener("mousedown", pointerDown);
    frame.addEventListener("touchstart", pointerDown, { passive: true });
    window.addEventListener("mousemove", pointerMove);
    window.addEventListener("touchmove", pointerMove, { passive: false });
    window.addEventListener("mouseup", pointerUp);
    window.addEventListener("touchend", pointerUp);

    function cleanup() {
      window.removeEventListener("mousemove", pointerMove);
      window.removeEventListener("touchmove", pointerMove);
      window.removeEventListener("mouseup", pointerUp);
      window.removeEventListener("touchend", pointerUp);
      overlay.remove();
    }

    document.getElementById("cropCancelBtn").addEventListener("click", cleanup);
    document.getElementById("cropUseBtn").addEventListener("click", function () {
      var outW = aspect === "portrait" ? 480 : 500;
      var outH = aspect === "portrait" ? 640 : 500;
      var canvas = document.createElement("canvas");
      canvas.width = outW; canvas.height = outH;
      var ctx = canvas.getContext("2d");
      var sx = -offsetX / curScale;
      var sy = -offsetY / curScale;
      var sW = frameW / curScale;
      var sH = frameH / curScale;
      ctx.drawImage(sourceImg, sx, sy, sW, sH, 0, 0, outW, outH);
      var dataUrl = canvas.toDataURL("image/jpeg", 0.85);
      var targetInput = document.getElementById(targetFieldId);
      if (targetInput) targetInput.value = dataUrl;
      var preview = document.getElementById(targetFieldId + "-preview");
      if (preview) { preview.src = dataUrl; preview.style.display = "block"; }
      cleanup();
    });
  }

  render();
})();
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("sw.js").catch(function () {});
  });
}
</script>
